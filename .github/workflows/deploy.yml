name: Build and Validate CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Root & Frontend Dependencies
      run: npm ci

    - name: Install Backend Dependencies
      run: |
        cd server
        npm ci

    - name: Verify Linter & Typechecks
      run: |
        npm run lint || echo "Linter warnings found"
        npm run build

    - name: Backend Build Check
      run: |
        cd server
        npx tsc --noEmit
